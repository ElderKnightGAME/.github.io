<!DOCTYPE html>

        /* 整体基础样式 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0a0e14; /* 深蓝色背景，契合之前Logo的质感 */
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        /* 左上角 Logo 容器 */
        .header-nav {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: flex-start;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .logo {
            height: 60px; /* 根据实际Logo比例调整 */
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        /* 主内容区 */
        .content {
            max-width: 800px;
            padding: 20px;
            margin-top: 80px;
        }

        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #d4af37; /* 金属金色，呼应骑士主题 */
            margin-bottom: 10px;
            border-bottom: 2px solid #d4af37;
            display: inline-block;
            padding-bottom: 10px;
        }

        .slogan {
            font-size: 1.5rem;
            font-style: italic;
            color: #b0b0b0;
            margin-bottom: 40px;
        }

        .description {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #cfcfcf;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 底部版权 */
        footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

    <!-- 顶部导航区域 -->
    <div class="header-nav">
        <!-- 这里的 logoking.png 记得替换成你实际的图片文件名 -->
        <img src="logoking.png" alt="Knight’s Oath Gaming Logo" class="logo">

    <div class="content">
